<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:s="http://jboss.com/products/seam/taglib" xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core" xmlns:h="http://java.sun.com/jsf/html" xmlns:rich="http://richfaces.org/rich"
	xmlns:a4j="http://richfaces.org/a4j" xmlns:c="http://java.sun.com/jstl/core" template="/layout/template.xhtml">
	<ui:define name="title">
		<h:outputText value="#{ortakIslemler.getMenuAdi('kgsPersonelTanimlama')}" />
	</ui:define>
	<ui:define name="body">

		<h:form>
			<a4j:region>

				<rich:panel header="#{ortakIslemler.getMenuUserAdi(kgsPersonelHome.session,'kgsPersonelTanimlama')}">
					<h:panelGrid columns="1">
						<a4j:outputPanel id="anaForm">

							<h:panelGrid columns="2" cellpadding="0" cellspacing="0">
								<s:decorate template="/layout/edit.xhtml">
									<ui:define name="label">Adı</ui:define>
									<h:inputText value="#{kgsPersonelHome.adi}" size="35" />
								</s:decorate>
								<s:decorate template="/layout/edit.xhtml">
									<ui:define name="label">Soyadı</ui:define>
									<h:inputText value="#{kgsPersonelHome.soyadi}" size="35" />
 								</s:decorate>
								<s:decorate template="/layout/edit.xhtml">
									<ui:define name="label">#{ortakIslemler.personelNoAciklama()}</ui:define>
									<h:inputText value="#{kgsPersonelHome.sicilNo}" size="10">
										<a4j:support event="onchange" status="ajaxStatus" reRender="aramaSonuc" action="#{kgsPersonelHome.fillPersonelList()}" />
 									</h:inputText>
								</s:decorate>
								<s:decorate template="/layout/edit.xhtml">
									<ui:define name="label">İşten Ayrılan Göster</ui:define>
									<h:selectBooleanCheckbox value="#{kgsPersonelHome.istenAyrilanGoster}">
										<a4j:support event="onclick" status="ajaxStatus" ajaxSingle="true" reRender="anaForm" />
									</h:selectBooleanCheckbox>
 								</s:decorate>
							</h:panelGrid>
						</a4j:outputPanel>
						<a4j:commandButton status="ajaxStatus" action="#{kgsPersonelHome.fillPersonelList()}" value="Personel Ara" reRender="aramaSonuc" />
						<a4j:outputPanel id="aramaSonuc">

							<rich:dataTable rowClasses="acik,koyu" value="#{kgsPersonelHome.sqlPersonelList}" var="per" rows="40" rowKeyVar="row" id="sablonTable">
								<f:facet name="header">
									<h:outputText value="Personeller" />
								</f:facet>
								<rich:column style="text-align:center">
									<f:facet name="header">
                      			  İşlemler
              		 			 </f:facet>
									<a4j:commandLink status="ajaxStatus" ajaxSingle="true" id="editlink" action="#{kgsPersonelHome.personelEkle(per)}"
										oncomplete="#{rich:component('editPanel')}.show()" reRender="editPanel">
										<h:graphicImage value="/img/edit.gif" style="border:0" />

									</a4j:commandLink>
									<rich:toolTip for="editlink" value="Güncelle" />
								</rich:column>
								<rich:column rendered="#{authenticatedUser.admin}" style="text-align:center">
									<f:facet name="header">
										<h:outputText value="Personel Id" />
									</f:facet>
									<h:outputText value="#{per.id}" />
								</rich:column>
								<rich:column style="text-align:center">
									<f:facet name="header">
										<h:outputText value="#{ortakIslemler.personelNoAciklama()}" />
									</f:facet>
									<h:outputText value="#{per.sicilNo}" />
								</rich:column>
								<rich:column filterBy="#{per.adi}" filterEvent="onkeyup">
									<f:facet name="header">
										<h:outputText value="Adı" />
									</f:facet>
									<h:outputText value="#{per.adi}" />

								</rich:column>
								<rich:column filterBy="#{per.soyadi}" filterEvent="onkeyup">
									<f:facet name="header">
										<h:outputText value="Soyadı" />
									</f:facet>
									<h:outputText value="#{per.soyadi}" />

								</rich:column>
								<rich:column style="text-align:center" rendered="#{kgsPersonelHome.kimlikGoster}">
									<f:facet name="header">
										<h:outputText value="#{ortakIslemler.kimlikNoAciklama()}" />
									</f:facet>
									<h:outputText value="#{per.kimlikNo}" />

								</rich:column>
								<rich:column style="text-align:center" rendered="#{kgsPersonelHome.kartNoGoster}">
									<f:facet name="header">
										<h:outputText value="#{ortakIslemler.kartNoAciklama()}" />
									</f:facet>
									<h:outputText value="#{per.kartId}" />

								</rich:column>
								<rich:column style="text-align:center">
									<f:facet name="header">
										<h:outputText value="İşe Giriş Tarihi" />
									</f:facet>
									<h:outputText value="#{authenticatedUser.dateFormatla(per.isGirisTarihi)}" />
								</rich:column>
								<rich:column style="text-align:center">
									<f:facet name="header">
										<h:outputText value="İşten Ayrılma Tarihi" />
									</f:facet>
									<h:outputText value="#{authenticatedUser.dateFormatla(per.isCikisTarihi)}" />
								</rich:column>
								<rich:column style="text-align:center" rendered="#{kgsPersonelHome.dTarihGoster}">
									<f:facet name="header">
										<h:outputText value="Doğum Tarihi" />
									</f:facet>
									<h:outputText value="#{authenticatedUser.dateFormatla(per.dogumTarihi)}" />
								</rich:column>
								<f:facet name="footer">
									<rich:datascroller renderIfSinglePage="false" maxPages="5" />
								</f:facet>
							</rich:dataTable>
							<ui:fragment rendered="#{kgsPersonelHome.ekle}">
								<a4j:commandButton status="ajaxStatus" value="Ekle" action="#{kgsPersonelHome.personelEkle(null)}" rendered="#{authenticatedUser.admin}"
									oncomplete="#{rich:component('editPanel')}.show()" reRender="editPanel" />
							</ui:fragment>


						</a4j:outputPanel>
					</h:panelGrid>
				</rich:panel>
			</a4j:region>
		</h:form>

		<rich:modalPanel id="editPanel" autosized="true" width="800" top="100">
			<f:facet name="header">
				<h:outputText value="Entegrasyon Harici Personel Güncelle" />
			</f:facet>
			<f:facet name="controls">
				<h:panelGroup>
					<h:form>
						<h:graphicImage value="/img/close.png" id="hidelink" styleClass="hidelink">
							<a4j:support event="onclick" action="#{kgsPersonelHome.instanceRefresh}" reRender="sablonTable"
								oncomplete="if (#{facesContext.maximumSeverity == null}) #{rich:component('editPanel')}.hide();" ajaxSingle="true" />
						</h:graphicImage>
					</h:form>
				</h:panelGroup>
			</f:facet>
			<h:form>
				<a4j:outputPanel ajaxRendered="true">
					<h:messages id="messages" styleClass="message" errorClass="errormsg" infoClass="infomsg" warnClass="warnmsg" />
				</a4j:outputPanel>
				<h:panelGrid columns="2">

					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">Adı</ui:define>
						<h:inputText required="true" requiredMessage="Adı giriniz" value="#{kgsPersonelHome.sqlPersonel.adi}" size="35" maxlength="30" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">Soyadı</ui:define>
						<h:inputText required="true" requiredMessage="Soyadı giriniz" value="#{kgsPersonelHome.sqlPersonel.soyadi}" size="35" maxlength="30" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">#{ortakIslemler.personelNoAciklama()}</ui:define>
						<h:inputText required="true" requiredMessage="#{ortakIslemler.personelNoAciklama()} giriniz" value="#{kgsPersonelHome.sqlPersonel.sicilNo}"
							size="35" maxlength="20" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">İşe Giriş Tarihi</ui:define>
						<rich:calendar enableManualInput="#{authenticatedUser.admin}" value="#{kgsPersonelHome.sqlPersonel.isGirisTarihi}"
							datePattern="#{authenticatedUser.dateFormat}" required="true" requiredMessage="İşe Giriş Tarihi Seçiniz" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">İşten Ayrılma Tarihi</ui:define>
						<rich:calendar enableManualInput="#{authenticatedUser.admin}" value="#{kgsPersonelHome.sqlPersonel.isCikisTarihi}"
							datePattern="#{authenticatedUser.dateFormat}" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">Doğum Tarihi</ui:define>
						<rich:calendar enableManualInput="#{authenticatedUser.admin}" value="#{kgsPersonelHome.sqlPersonel.dogumTarihi}"
							datePattern="#{authenticatedUser.dateFormat}" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">#{ortakIslemler.kimlikNoAciklama()}</ui:define>
						<h:inputText value="#{kgsPersonelHome.sqlPersonel.kimlikNo}" size="35" maxlength="20" />
					</s:decorate>
					<s:decorate template="/layout/edit.xhtml">
						<ui:define name="label">#{ortakIslemler.kartNoAciklama()}</ui:define>
						<h:inputText value="#{kgsPersonelHome.sqlPersonel.kartId}" size="35" maxlength="20" />
					</s:decorate>



				</h:panelGrid>
				<ui:fragment rendered="#{kgsPersonelHome.kayitEdilebilir}">
					<a4j:commandButton status="ajaxStatus" value="Kaydet" action="#{kgsPersonelHome.kaydet()}" reRender="aramaSonuc"
						oncomplete="if (#{facesContext.maximumSeverity == null}) #{rich:component('editPanel')}.hide();" />
				</ui:fragment>
			</h:form>
		</rich:modalPanel>



	</ui:define>

</ui:composition>
