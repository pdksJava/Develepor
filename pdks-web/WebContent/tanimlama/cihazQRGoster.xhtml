<!DOCTYPE composition PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:s="http://jboss.com/products/seam/taglib" xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:f="http://java.sun.com/jsf/core" xmlns:h="http://java.sun.com/jsf/html" xmlns:rich="http://richfaces.org/rich"
	xmlns:a4j="http://richfaces.org/a4j" xmlns:c="http://java.sun.com/jstl/core" template="/layout/popup.xhtml">

	<ui:define name="body">

		<h:form>
			<a4j:region>
				<div style="text-align: center; padding: 20px;">

					<ui:fragment rendered="#{startupAction.projeHeaderImage != null}">
						<div width="120" height="83" align="center">
							<ui:fragment rendered="#{startupAction.projeURL != null}">
								<a href="#" title="#{startupAction.projeURL}" id="imageURL" onclick="createPop('#{startupAction.projeURL}',this.id);return false;"> <s:graphicImage
										value="#{startupAction.projeHeaderImage}" width="#{startupAction.projeHeaderImageWidth}" height="#{startupAction.projeHeaderImageHeight}" /></a>
							</ui:fragment>
							<ui:fragment rendered="#{startupAction.projeURL == null}">
								<s:graphicImage value="#{startupAction.projeHeaderImage}" width="#{startupAction.projeHeaderImageWidth}"
									height="#{startupAction.projeHeaderImageHeight}" />
							</ui:fragment>


						</div>
					</ui:fragment>
					<!-- QR Kod (Görsel olarak bean'den veya static gelmeli) -->
					<ui:fragment rendered="#{cihazHome.data!=null}">
						<ui:fragment rendered="#{cihazHome.adi != null}">
							<span style="font-weight: bold; font-size: 24px; color: black;">#{cihazHome.adi}</span>
							<br></br>
						</ui:fragment>
						<s:graphicImage value="#{cihazHome.data}" />
						<ui:fragment rendered="#{cihazHome.tipAciklama != null}">
							<br></br>
							<span style="font-weight: bold; font-size: 24px; color: blue;">#{cihazHome.tipAciklama}</span>
						</ui:fragment>
					</ui:fragment>

					<br />


				</div>
			</a4j:region>
		</h:form>


	</ui:define>

</ui:composition>
